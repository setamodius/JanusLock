[env:esp32-c3-devkitm-1]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino

monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0

build_flags =
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
  olikraus/U8g2
  tzapu/WiFiManager
  bblanchon/ArduinoJson
  knolleary/PubSubClient